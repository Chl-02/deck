<!DOCTYPE html>
<html class="staticrypt-html" lang="ko">
    <head>
        <meta charset="utf-8" />
        <title>로그인</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            :root {
                --grad-a: #6366f1;
                --grad-b: #8b5cf6;
                --accent: #6366f1;
                --accent-hover: #5457e8;
                --ink: #1e1b2e;
                --muted: #8a8699;
                --field: #f5f5fb;
                --field-focus: #ffffff;
                --border: #e6e4f0;
            }

            * { box-sizing: border-box; }

            .staticrypt-html { height: 100%; }

            .staticrypt-body {
                height: 100%;
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "맑은 고딕",
                    "Apple SD Gothic Neo", Roboto, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-content {
                height: 100%;
                margin: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
                background: linear-gradient(135deg, var(--grad-a) 0%, var(--grad-b) 100%);
            }

            .staticrypt-page {
                width: 100%;
                max-width: 380px;
                margin: 0;
                padding: 0;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: #ffffff;
                border-radius: 18px;
                padding: 40px 36px 34px;
                text-align: center;
                box-shadow: 0 24px 60px -12px rgba(49, 36, 99, 0.45),
                    0 8px 24px -8px rgba(49, 36, 99, 0.25);
            }

            .staticrypt-lock {
                width: 56px;
                height: 56px;
                margin: 0 auto 18px;
                border-radius: 16px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, var(--grad-a), var(--grad-b));
                box-shadow: 0 8px 20px -6px rgba(99, 102, 241, 0.6);
            }
            .staticrypt-lock svg { width: 26px; height: 26px; fill: #fff; }

            .staticrypt-instructions { margin: 0 0 4px; }

            .staticrypt-title {
                font-size: 1.35em;
                font-weight: 700;
                color: var(--ink);
                margin: 0 0 6px;
                letter-spacing: -0.01em;
            }
            .staticrypt-instructions p:not(.staticrypt-title) {
                font-size: 0.9em;
                color: var(--muted);
                margin: 0;
                line-height: 1.5;
            }

            .staticrypt-hr {
                margin: 22px 0;
                border: 0;
                border-top: 1px solid var(--border);
            }

            .staticrypt-password-container {
                position: relative;
                background: var(--field);
                width: 100%;
                border: 1.5px solid var(--border);
                border-radius: 12px;
                margin: 0 0 16px;
                transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
            }
            .staticrypt-password-container:focus-within {
                border-color: var(--accent);
                background: var(--field-focus);
                box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.14);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                font-size: 15px;
                outline: 0;
                padding: 15px 46px 15px 16px;
                width: 100%;
                color: var(--ink);
                border-radius: 12px;
            }
            .staticrypt-form input::placeholder { color: var(--muted); }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                width: 20px;
                opacity: 0.5;
                padding: 14px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                transition: opacity 0.15s;
            }
            .staticrypt-toggle-password-visibility:hover { opacity: 0.85; }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 18px;
                font-size: 0.88em;
                color: var(--muted);
                cursor: pointer;
            }
            .staticrypt-remember input[type="checkbox"] {
                width: 16px;
                height: 16px;
                margin-right: 10px;
                accent-color: var(--accent);
                cursor: pointer;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                outline: 0;
                background: var(--accent);
                width: 100%;
                border: 0;
                border-radius: 12px;
                padding: 15px;
                color: #ffffff;
                font-size: 15px;
                font-weight: 600;
                letter-spacing: 0.02em;
                cursor: pointer;
                transition: background 0.15s, transform 0.05s, box-shadow 0.15s;
                box-shadow: 0 8px 18px -8px rgba(99, 102, 241, 0.7);
            }
            .staticrypt-form .staticrypt-decrypt-button:hover {
                background: var(--accent-hover);
                box-shadow: 0 10px 22px -8px rgba(99, 102, 241, 0.8);
            }
            .staticrypt-form .staticrypt-decrypt-button:active { transform: translateY(1px); }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: linear-gradient(135deg, var(--grad-a) 0%, var(--grad-b) 100%);
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 2.4rem;
                height: 2.4rem;
                border: 0.28em solid rgba(255, 255, 255, 0.4);
                border-right-color: #ffffff;
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] { font-size: 16px; }
            }
        </style>
    </head>

                    </form>
                </div>
