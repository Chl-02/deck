<!DOCTYPE html>
<html class="staticrypt-html">
<head>
<meta charset="utf-8" />
<title>HD현대</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<meta http-equiv="cache-control" content="max-age=0" />
<meta http-equiv="cache-control" content="no-cache" />
<meta http-equiv="expires" content="0" />
<meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
<meta http-equiv="pragma" content="no-cache" />
<style>
:root{ --accent:#333; --ink:#111; --muted:#666; --line:#ccc; }
*{ box-sizing:border-box; }
.staticrypt-html,.staticrypt-body{ height:100%; margin:0; }
.staticrypt-content{
  height:100%; margin:0;
  font-family:-apple-system,"Helvetica Neue","Segoe UI","맑은 고딕",sans-serif;
  background:#f4f4f4; color:var(--ink);
  display:flex; align-items:center; justify-content:center; padding:24px;
}
.staticrypt-page{ width:100%; max-width:360px; }
.staticrypt-form{
  background:#fff; border:1px solid #ddd; border-radius:6px;
  padding:36px 32px 30px; text-align:left;
}
.staticrypt-title{ font-size:18px; font-weight:600; color:var(--ink); margin:0 0 6px; }
.staticrypt-instructions p:not(.staticrypt-title){ font-size:13px; color:var(--muted); margin:0 0 22px; line-height:1.5; }
.staticrypt-hr{ display:none; }
.staticrypt-password-container{
  position:relative; background:#fff; border:1px solid var(--line);
  border-radius:5px; margin:0 0 14px;
}
.staticrypt-password-container:focus-within{ border-color:#888; }
.staticrypt-form input[type="password"], .staticrypt-form input[type="text"]{
  background:transparent; border:0; outline:0; width:100%;
  font-size:15px; color:var(--ink); padding:13px 44px 13px 14px;
}
.staticrypt-toggle-password-visibility{
  cursor:pointer; height:18px; width:18px; opacity:.45; padding:0;
  position:absolute; right:14px; top:50%; transform:translateY(-50%);
}
.staticrypt-form .staticrypt-decrypt-button{
  text-transform:none; outline:0; width:100%; border:0;
  padding:13px; border-radius:5px; color:#fff; font-size:15px; font-weight:600;
  cursor:pointer; background:#333; transition:background .12s;
}
.staticrypt-form .staticrypt-decrypt-button:hover{ background:#000; }
label.staticrypt-remember{ display:flex; align-items:center; font-size:13px; color:var(--muted); margin:14px 0 4px; }
.staticrypt-remember input[type="checkbox"]{ transform:scale(1.2); margin-right:9px; }
.hidden{ display:none !important; }
.staticrypt-spinner-container{ height:100%; display:flex; align-items:center; justify-content:center; background:#f4f4f4; }
.staticrypt-spinner{ display:inline-block; width:2rem; height:2rem; border:0.25em solid #ccc;
  border-right-color:transparent; border-radius:50%; animation:spinner-border .75s linear infinite; }
@keyframes spinner-border{ 100%{ transform:rotate(360deg); } }
@media screen and (-webkit-min-device-pixel-ratio:0){
  .staticrypt-form input[type="password"], .staticrypt-form input[type="text"]{ font-size:16px; }
}
</style>
</head>
<body class="staticrypt-body">

</div>

    <div class="staticrypt-form">

      <hr class="staticrypt-hr" />

      <form id="staticrypt-form" action="#" method="post">
        <div class="staticrypt-password-container">

          <img class="staticrypt-toggle-password-visibility" alt="Show password" title="Show password"

        </label>

        <input type="submit" class="staticrypt-decrypt-button" value="로그인" />

    </div>
  </div>
</div>
