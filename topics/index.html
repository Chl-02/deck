<!DOCTYPE html>
<html class="staticrypt-html" lang="ko">
    <head>
        <meta charset="utf-8" />
        <title>연구 주제 잡는 법</title>
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- do not cache this page -->
        <meta http-equiv="cache-control" content="max-age=0" />
        <meta http-equiv="cache-control" content="no-cache" />
        <meta http-equiv="expires" content="0" />
        <meta http-equiv="expires" content="Tue, 01 Jan 1980 1:00:00 GMT" />
        <meta http-equiv="pragma" content="no-cache" />

        <style>
            :root {
                --bg: #f3f4f6;
                --accent: #2563eb;
                --accent-hover: #1d4ed8;
                --ink: #111827;
                --muted: #6b7280;
                --field: #f9fafb;
                --field-focus: #ffffff;
                --border: #e5e7eb;
            }

            * { box-sizing: border-box; }

            .staticrypt-html { height: 100%; }

            .staticrypt-body {
                height: 100%;
                margin: 0;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "맑은 고딕",
                    "Apple SD Gothic Neo", Roboto, sans-serif;
                -webkit-font-smoothing: antialiased;
                -moz-osx-font-smoothing: grayscale;
            }

            .staticrypt-content {
                height: 100%;
                margin: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 24px;
                background: var(--bg);
            }

            .staticrypt-page {
                width: 100%;
                max-width: 380px;
                margin: 0;
                padding: 0;
            }

            .staticrypt-form {
                position: relative;
                z-index: 1;
                background: #ffffff;
                border-radius: 18px;
                padding: 40px 36px 34px;
                text-align: center;
                border: 1px solid var(--border);
                box-shadow: 0 1px 3px rgba(17, 24, 39, 0.06),
                    0 8px 24px -12px rgba(17, 24, 39, 0.12);
            }

            .staticrypt-lock {
                width: 56px;
                height: 56px;
                margin: 0 auto 18px;
                border-radius: 16px;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--accent);
            }
            .staticrypt-lock svg { width: 26px; height: 26px; fill: #fff; }

            .staticrypt-instructions { margin: 0 0 4px; }

            .staticrypt-title {
                font-size: 1.35em;
                font-weight: 700;
                color: var(--ink);
                margin: 0 0 6px;
                letter-spacing: -0.01em;
            }
            .staticrypt-instructions p:not(.staticrypt-title) {
                font-size: 0.9em;
                color: var(--muted);
                margin: 0;
                line-height: 1.5;
            }

            .staticrypt-hr {
                margin: 22px 0;
                border: 0;
                border-top: 1px solid var(--border);
            }

            .staticrypt-password-container {
                position: relative;
                background: var(--field);
                width: 100%;
                border: 1.5px solid var(--border);
                border-radius: 12px;
                margin: 0 0 16px;
                transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
            }
            .staticrypt-password-container:focus-within {
                border-color: var(--accent);
                background: var(--field-focus);
                box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
            }

            .staticrypt-form input[type="password"],
            .staticrypt-form input[type="text"] {
                background: transparent;
                border: 0;
                font-size: 15px;
                outline: 0;
                padding: 15px 46px 15px 16px;
                width: 100%;
                color: var(--ink);
                border-radius: 12px;
            }
            .staticrypt-form input::placeholder { color: var(--muted); }

            .staticrypt-toggle-password-visibility {
                cursor: pointer;
                height: 20px;
                width: 20px;
                opacity: 0.5;
                padding: 14px;
                position: absolute;
                right: 0;
                top: 50%;
                transform: translateY(-50%);
                transition: opacity 0.15s;
            }
            .staticrypt-toggle-password-visibility:hover { opacity: 0.85; }

            label.staticrypt-remember {
                display: flex;
                align-items: center;
                margin-bottom: 18px;
                font-size: 0.88em;
                color: var(--muted);
                cursor: pointer;
            }
            .staticrypt-remember input[type="checkbox"] {
                width: 16px;
                height: 16px;
                margin-right: 10px;
                accent-color: var(--accent);
                cursor: pointer;
            }

            .staticrypt-form .staticrypt-decrypt-button {
                outline: 0;
                background: var(--accent);
                width: 100%;
                border: 0;
                border-radius: 12px;
                padding: 15px;
                color: #ffffff;
                font-size: 15px;
                font-weight: 600;
                letter-spacing: 0.02em;
                cursor: pointer;
                transition: background 0.15s, transform 0.05s;
            }
            .staticrypt-form .staticrypt-decrypt-button:hover {
                background: var(--accent-hover);
            }
            .staticrypt-form .staticrypt-decrypt-button:active { transform: translateY(1px); }

            .hidden { display: none !important; }

            .staticrypt-spinner-container {
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                background: var(--bg);
            }
            .staticrypt-spinner {
                display: inline-block;
                width: 2.4rem;
                height: 2.4rem;
                border: 0.28em solid rgba(37, 99, 235, 0.25);
                border-right-color: var(--accent);
                border-radius: 50%;
                animation: spinner-border 0.75s linear infinite;
            }
            @keyframes spinner-border {
                100% { transform: rotate(360deg); }
            }

            @media screen and (-webkit-min-device-pixel-ratio: 0) {
                .staticrypt-form input[type="password"],
                .staticrypt-form input[type="text"] { font-size: 16px; }
            }
        </style>
    </head>

    <body class="staticrypt-body">

                        </label>

                        <input type="submit" class="staticrypt-decrypt-button" value="로그인" />
                    </form>
                </div>
            </div>
        </div>
